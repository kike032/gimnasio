<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IronCore - Consultas</title>

  <!-- jQuery -->
  <script src="https://code.jquery.com/jquery-3.7.1.js" integrity="sha256-eKhayi8LEQwp4NKxN+CfCh+3qOVUtJn3QNZ0TciWLP4=" crossorigin="anonymous"></script>

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

  <!-- Tabler Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css" />

  <style>
    body {
      background-color: #1a1a1a;
      min-height: 100vh;
    }

    /* ── Sidebar ── */
    #sidebar {
      width: 224px;
      min-height: 100vh;
      background-color: #0a0a0a;
      border-right: 1px solid #2a2a2a;
      display: flex;
      flex-direction: column;
      transition: width 0.25s ease;
      overflow: hidden;
      flex-shrink: 0;
    }
    #sidebar.collapsed { width: 60px; }

    /* Logo */
    .sidebar-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 16px 14px;
      border-bottom: 1px solid #2a2a2a;
      white-space: nowrap;
      overflow: hidden;
    }
    .logo-mark {
      width: 32px; height: 32px; min-width: 32px;
      background-color: #F5C400;
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
    }
    .logo-mark i { color: #111; font-size: 18px; }
    .logo-text { opacity: 1; transition: opacity 0.15s ease; }
    .logo-name { font-size: 14px; font-weight: 500; color: #fff; line-height: 1.2; }
    .logo-sub  { font-size: 10px; color: #666; letter-spacing: 0.08em; text-transform: uppercase; }
    #sidebar.collapsed .logo-text { opacity: 0; }

    /* Nav */
    .nav-section-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #F5C400;
      padding: 12px 12px 4px;
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: opacity 0.15s ease;
    }
    #sidebar.collapsed .nav-section-label { opacity: 0; }

    .nav-link-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 12px;
      border-radius: 8px;
      color: #888;
      text-decoration: none;
      white-space: nowrap;
      overflow: hidden;
      transition: background 0.15s, color 0.15s;
      position: relative;
    }
    .nav-link-item:hover { background-color: #1a1a1a; color: #fff; }
    .nav-link-item.active { background-color: #1e1a00; color: #F5C400; }
    .nav-link-item.active::before {
      content: '';
      position: absolute; left: 0; top: 20%; height: 60%; width: 3px;
      background-color: #F5C400;
      border-radius: 0 3px 3px 0;
    }
    .nav-link-item i { font-size: 18px; min-width: 20px; flex-shrink: 0; }
    .nav-link-item .link-label { font-size: 13px; opacity: 1; transition: opacity 0.15s ease; }
    #sidebar.collapsed .link-label { opacity: 0; }

    /* Footer / toggle */
    .sidebar-footer {
      padding: 10px 8px 14px;
      border-top: 1px solid #2a2a2a;
    }
    #toggleBtn {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding: 6px 10px;
      border-radius: 8px;
      color: #555;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }
    #toggleBtn:hover { background-color: #1a1a1a; color: #F5C400; }
    #toggleBtn i { font-size: 20px; transition: transform 0.25s ease; }
    #sidebar.collapsed #toggleBtn i { transform: rotate(180deg); }

    /* Contenido principal */
    #mainContent {
      flex: 1;
      padding: 40px;
      color: #888;
    }
  </style>
</head>
<body>

<div class="d-flex">

  <!-- ── SIDEBAR ── -->
  <nav id="sidebar">

    <!-- Logo -->
    <div class="sidebar-logo">
      <div class="logo-mark"><i class="ti ti-barbell"></i></div>
      <div class="logo-text">
        <div class="logo-name">PerfectBody</div>
        <div class="logo-sub">Gimnasio</div>
      </div>
    </div>

    <!-- Menú -->
    <div class="flex-grow-1 px-2 py-2 d-flex flex-column gap-1 overflow-auto">

      <div class="nav-section-label">
        <i class="ti ti-database"></i> Consultas
      </div>

      <a href="FormAlumnos.jsp" class="nav-link-item active">
        <i class="ti ti-user-heart"></i>
        <span class="link-label">Alumnos</span>
      </a>

      <a href="FormIncripciones.jsp" class="nav-link-item">
        <i class="ti ti-clipboard-list"></i>
        <span class="link-label">Inscripciones</span>
      </a>

      <a href="FormAsistencias.jsp" class="nav-link-item">
        <i class="ti ti-calendar-check"></i>
        <span class="link-label">Asistencias</span>
      </a>

      <a href="FormAtenciones.jsp" class="nav-link-item">
        <i class="ti ti-urgent"></i>
        <span class="link-label">Atenciones</span>
      </a>

      <a href="FormServicios.jsp" class="nav-link-item">
        <i class="ti ti-category"></i>
        <span class="link-label">Servicios</span>
      </a>

      <a href="FormPagos.jsp" class="nav-link-item">
        <i class="ti ti-coin"></i>
        <span class="link-label">Pagos</span>
      </a>

      <a href="FormComprobantes.jsp" class="nav-link-item">
        <i class="ti ti-receipt"></i>
        <span class="link-label">Comprobantes</span>
      </a>

      <a href="FormUsuarios.jsp" class="nav-link-item">
        <i class="ti ti-users"></i>
        <span class="link-label">Usuarios</span>
      </a>

      <a href="FormRol.jsp" class="nav-link-item">
        <i class="ti ti-shield-check"></i>
        <span class="link-label">Roles</span>
      </a>

    </div>


  </nav>

</div>



</body>
</html>
